name: SZTU Course Watcher (Final)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-watcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests selenium

      - name: Run Sentry Monitor
        env:
          STU_ID: ${{ secrets.STU_ID }}
          STU_PWD: ${{ secrets.STU_PWD }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: python sentry_monitor.py

      - name: Sync Status
        run: |
          git config --global user.name "SentryBot"
          git config --global user.email "bot@github.com"
          git add course_status.json
          git commit -m "Update status [skip ci]" || exit 0
          git push
